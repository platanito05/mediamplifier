<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

</head>
<body>

  <button class="edit-toggle" id="editBtn" onclick="editor.toggle()">EDITAR</button>

  <script>
  const params = new URLSearchParams(window.location.search);

  if (params.has('edit')) {
    document.getElementById('editBtn').style.display = 'block';
  }

  if (params.has('preview')) {
    document.body.classList.add('preview-mode');
    document.addEventListener('DOMContentLoaded', initViewer);
  }

  function initViewer() {
    const items = Array.from(document.querySelectorAll('.item'));
    if (!items.length) return;

    let current = 0;
    let animating = false;

    // Build viewer
    const viewer = document.createElement('div');
    viewer.id = 'viewer';
    document.body.appendChild(viewer);

    // Build nav dots
    const nav = document.createElement('div');
    nav.id = 'viewer-nav';
    document.body.appendChild(nav);

    // Preload all images so transitions are instant
    items.forEach(item => {
      const preload = new Image();
      preload.src = item.querySelector('img').src;
    });

    // Create slides
    const slides = items.map((item, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide' + (i === 0 ? ' active' : '');
      const img = document.createElement('img');
      img.src = item.querySelector('img').src;
      img.alt = item.querySelector('img').alt;
      slide.appendChild(img);
      const cap = item.querySelector('.caption');
      if (cap) {
        const caption = document.createElement('span');
        caption.className = 'slide-caption';
        caption.textContent = cap.textContent;
        slide.appendChild(caption);
      }
      viewer.appendChild(slide);

      // Nav dot
      const dot = document.createElement('div');
      dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      nav.appendChild(dot);

      return slide;
    });

    const dots = Array.from(nav.querySelectorAll('.nav-dot'));

    function goTo(next) {
      if (animating || next === current || next < 0 || next >= slides.length) return;
      animating = true;
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = next;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
      setTimeout(() => { animating = false; }, 150);
    }

    function go(dir) { goTo(current + dir); }

    // Mouse wheel
    let wheelAccum = 0;
    window.addEventListener('wheel', e => {
      e.preventDefault();
      wheelAccum += e.deltaY;
      if (Math.abs(wheelAccum) > 60) {
        go(wheelAccum > 0 ? 1 : -1);
        wheelAccum = 0;
      }
    }, { passive: false });

    // Arrow keys
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown') go(1);
      if (e.key === 'ArrowUp') go(-1);
    });

    // Touch
    let touchY = 0;
    window.addEventListener('touchstart', e => { touchY = e.touches[0].clientY; });
    window.addEventListener('touchend', e => {
      const diff = touchY - e.changedTouches[0].clientY;
      if (Math.abs(diff) > 40) go(diff > 0 ? 1 : -1);
    });
  }

  // ── Hardcoded layout fallback (used on GitHub Pages where localStorage is empty) ──
  const LAYOUT_FALLBACK = {"viewportWidth":1470,"images":[{"x":118,"y":61.981,"w":571,"h":807.689,"rotation":0},{"x":853,"y":32.8,"w":487,"h":688.87,"rotation":6.8489},{"x":1055,"y":935.92,"w":321,"h":167.677,"rotation":-1.34778},{"x":517,"y":1197.42,"w":476,"h":595,"rotation":0},{"x":91,"y":1286.94,"w":355,"h":502.154,"rotation":-4.43811},{"x":970,"y":1234.7,"w":491,"h":618.337,"rotation":0},{"x":44,"y":1767.58,"w":485,"h":606.25,"rotation":0},{"x":492,"y":1733.08,"w":491,"h":613.75,"rotation":-2.68546},{"x":516,"y":715.08,"w":422,"h":527.5,"rotation":-1.95251},{"x":127,"y":945.8,"w":258,"h":245.545,"rotation":0},{"x":13,"y":2228.83,"w":509,"h":636.25,"rotation":1.24339},{"x":971,"y":1763.58,"w":478,"h":597.5,"rotation":0},{"x":578,"y":2326.66,"w":349.007,"h":493.673,"rotation":-2.66548}],"drawings":[]};

  (function restoreLayout() {
    if (params.has('preview')) return; // skip saved layout in preview mode
    const saved = localStorage.getItem('mediaLayout');
    const data = saved ? JSON.parse(saved) : LAYOUT_FALLBACK;
    if (!data) return;
    const grid = document.querySelector('.grid');
    const items = document.querySelectorAll('.item');
    let maxBottom = 0;
    const images  = Array.isArray(data) ? data : (data.images  || []);
    const drawings = Array.isArray(data) ? []   : (data.drawings || []);

    images.forEach((pos, i) => {
      const item = items[i];
      if (!item) return;
      Object.assign(item.style, {
        position: 'absolute', left: pos.x + 'px', top: pos.y + 'px',
        width: pos.w + 'px', height: pos.h + 'px', overflow: 'visible',
        transform: `rotate(${pos.rotation || 0}deg)`,
        transformOrigin: 'center center',
      });
      const img = item.querySelector('img');
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
      maxBottom = Math.max(maxBottom, pos.y + pos.h);
    });

    drawings.forEach(d => {
      const el = document.createElement('img');
      el.className = 'drawing-item';
      el.src = d.src;
      Object.assign(el.style, {
        position: 'absolute', left: d.x + 'px', top: d.y + 'px',
        width: d.w + 'px', height: d.h + 'px',
        pointerEvents: 'none', zIndex: '150',
      });
      grid.appendChild(el);
      maxBottom = Math.max(maxBottom, d.y + d.h);
    });
    const designW = data.viewportWidth || 1470;
    const designH = maxBottom + 60;
    grid.style.display = 'block';
    grid.style.position = 'relative';
    grid.style.width = designW + 'px';
    grid.style.height = designH + 'px';

    function applyScale() {
      const scale = window.innerWidth / designW;
      grid.style.transform = `scale(${scale})`;
      grid.style.transformOrigin = 'top left';
      grid.style.marginBottom = (designH * scale - designH) + 'px';
    }
    applyScale();
    window.addEventListener('resize', applyScale);

    // Restore drawing overlay
    const savedDrawing = localStorage.getItem('mediaDrawing');
    if (savedDrawing) {
      const overlay = document.createElement('img');
      Object.assign(overlay.style, {
        position: 'absolute', top: '0', left: '0',
        width: '100%', pointerEvents: 'none', zIndex: '200',
      });
      overlay.src = savedDrawing;
      overlay.id = 'drawing-overlay';
      grid.appendChild(overlay);
    }
  })();

  const editor = {
    canvas: null, active: false, widgets: [], drawWidgets: [],

    toggle() {
      this.active ? this.close() : this.open();
      this.active = !this.active;
      document.getElementById('editBtn').textContent = this.active ? '✕ CERRAR' : 'EDITAR';
    },

    open() {
      this.widgets = [];
      this.drawWidgets = [];
      const docH = Math.max(document.body.scrollHeight, window.innerHeight);
      this.canvas = document.createElement('div');
      Object.assign(this.canvas.style, {
        position: 'absolute', top: '0', left: '0',
        width: '100%', height: docH + 'px',
        background: 'rgba(245,245,245,0.97)', zIndex: '8000',
      });
      document.body.appendChild(this.canvas);

      const bar = document.createElement('div');
      bar.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#0066ff;color:#fff;font:11px monospace;padding:6px 16px;z-index:9000;display:flex;align-items:center;gap:10px;';

      const info = document.createElement('span');
      info.textContent = 'Mover · Redimensionar · ENTER aplicar · ESC cancelar';
      info.style.flex = '1';
      bar.appendChild(info);

      // ── Draw toggle ──
      const drawBtn = document.createElement('button');
      drawBtn.textContent = '✏ Dibujar';
      drawBtn.style.cssText = 'background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.5);padding:4px 10px;font:bold 11px monospace;cursor:pointer;border-radius:2px;';
      bar.appendChild(drawBtn);

      // Colors
      const colors = ['#000000','#ffffff','#ff0000','#ffcc00','#0044ff'];
      let currentColor = '#000000';
      const colorBtns = colors.map(c => {
        const btn = document.createElement('div');
        btn.style.cssText = `width:16px;height:16px;background:${c};border:2px solid ${c==='#ffffff'?'#999':'#fff'};cursor:pointer;border-radius:50%;flex-shrink:0;`;
        btn.title = c;
        btn.addEventListener('click', () => {
          currentColor = c; currentSize = this._eraserActive ? currentSize : currentSize;
          this._eraserActive = false;
          drawCtx.globalCompositeOperation = 'source-over';
          colorBtns.forEach(b => b.style.outline = 'none');
          btn.style.outline = '2px solid #fff';
        });
        bar.appendChild(btn);
        return btn;
      });
      colorBtns[0].style.outline = '2px solid #fff';

      // Size
      const sizes = [2, 5, 12];
      const sizeLabels = ['S','M','L'];
      let currentSize = 5;
      sizes.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.textContent = sizeLabels[i];
        btn.style.cssText = `background:${i===1?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.15)'};color:#fff;border:1px solid rgba(255,255,255,0.4);padding:3px 7px;font:bold 10px monospace;cursor:pointer;border-radius:2px;`;
        btn.addEventListener('click', () => {
          currentSize = s;
          bar.querySelectorAll('.sizebtn').forEach(b => b.style.background = 'rgba(255,255,255,0.15)');
          btn.style.background = 'rgba(255,255,255,0.4)';
        });
        btn.className = 'sizebtn';
        bar.appendChild(btn);
      });

      // Eraser
      const eraserBtn = document.createElement('button');
      eraserBtn.textContent = '🧹 Goma';
      eraserBtn.style.cssText = 'background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.4);padding:4px 10px;font:bold 11px monospace;cursor:pointer;border-radius:2px;';
      eraserBtn.addEventListener('click', () => {
        this._eraserActive = !this._eraserActive;
        drawCtx.globalCompositeOperation = this._eraserActive ? 'destination-out' : 'source-over';
        eraserBtn.style.background = this._eraserActive ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.15)';
        // Auto-enable draw mode when eraser is on
        if (this._eraserActive && !drawActive) {
          drawActive = true;
          drawCanvas.style.pointerEvents = 'auto';
          drawBtn.style.background = 'rgba(255,255,255,0.5)';
          drawBtn.textContent = '✏ Dibujando';
        }
      });
      bar.appendChild(eraserBtn);

      // Clear
      const clearBtn = document.createElement('button');
      clearBtn.textContent = '🗑';
      clearBtn.style.cssText = 'background:rgba(255,0,0,0.3);color:#fff;border:1px solid rgba(255,255,255,0.4);padding:4px 8px;font:11px monospace;cursor:pointer;border-radius:2px;';
      clearBtn.addEventListener('click', () => drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height));
      bar.appendChild(clearBtn);

      // Convert drawing to movable widget
      const toWidgetBtn = document.createElement('button');
      toWidgetBtn.textContent = '↕ Mover trazo';
      toWidgetBtn.style.cssText = 'background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.5);padding:4px 10px;font:bold 11px monospace;cursor:pointer;border-radius:2px;';
      toWidgetBtn.addEventListener('click', () => {
        // Find bounding box of drawn pixels
        const iData = drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height).data;
        let minX = drawCanvas.width, minY = drawCanvas.height, maxX = 0, maxY = 0;
        for (let y = 0; y < drawCanvas.height; y++) {
          for (let x = 0; x < drawCanvas.width; x++) {
            if (iData[(y * drawCanvas.width + x) * 4 + 3] > 10) {
              if (x < minX) minX = x; if (x > maxX) maxX = x;
              if (y < minY) minY = y; if (y > maxY) maxY = y;
            }
          }
        }
        if (maxX <= minX || maxY <= minY) return;

        const pad = 12;
        const cx = Math.max(0, minX - pad), cy = Math.max(0, minY - pad);
        const cw = Math.min(drawCanvas.width  - cx, maxX - minX + pad * 2);
        const ch = Math.min(drawCanvas.height - cy, maxY - minY + pad * 2);

        const tmp = document.createElement('canvas');
        tmp.width = cw; tmp.height = ch;
        tmp.getContext('2d').drawImage(drawCanvas, cx, cy, cw, ch, 0, 0, cw, ch);
        const dataUrl = tmp.toDataURL();

        // Create movable widget (add to drawWidgets, not widgets)
        const w = this.addWidget(dataUrl, 'drawing', cx, cy, cw, ch);
        this.drawWidgets.push(w);

        // Add ✕ delete button to this drawing widget
        const del = document.createElement('button');
        del.textContent = '✕';
        del.style.cssText = 'position:absolute;top:-26px;right:0;background:#ff3333;color:#fff;border:none;padding:3px 8px;font:bold 11px monospace;cursor:pointer;border-radius:2px;z-index:3;';
        del.addEventListener('mousedown', e => e.stopPropagation());
        del.addEventListener('click', () => {
          const idx = this.drawWidgets.indexOf(w);
          if (idx > -1) this.drawWidgets.splice(idx, 1);
          w.remove();
        });
        w.appendChild(del);

        // Clear that area from drawing canvas
        drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      });
      bar.appendChild(toWidgetBtn);

      this.canvas.appendChild(bar);

      // ── Drawing canvas ──
      const drawCanvas = document.createElement('canvas');
      drawCanvas.width  = window.innerWidth;
      drawCanvas.height = Math.max(document.body.scrollHeight, window.innerHeight);
      Object.assign(drawCanvas.style, {
        position: 'absolute', top: '0', left: '0',
        pointerEvents: 'none', zIndex: '8500',
      });
      this.canvas.appendChild(drawCanvas);
      const drawCtx = drawCanvas.getContext('2d');
      this._eraserActive = false;

      // Restore existing drawing
      const savedDrawing = localStorage.getItem('mediaDrawing');
      if (savedDrawing) {
        const img = new Image();
        img.onload = () => drawCtx.drawImage(img, 0, 0);
        img.src = savedDrawing;
      }

      let isDrawing = false, drawActive = false;
      this._drawCanvas = drawCanvas;
      this._drawCtx = drawCtx;

      drawBtn.addEventListener('click', () => {
        drawActive = !drawActive;
        drawCanvas.style.pointerEvents = drawActive ? 'auto' : 'none';
        drawBtn.style.background = drawActive ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.2)';
        drawBtn.textContent = drawActive ? '✏ Dibujando' : '✏ Dibujar';
        // Disable eraser when switching to draw
        if (drawActive && this._eraserActive) {
          this._eraserActive = false;
          drawCtx.globalCompositeOperation = 'source-over';
          eraserBtn.style.background = 'rgba(255,255,255,0.15)';
        }
      });

      drawCanvas.addEventListener('mousedown', e => {
        isDrawing = true;
        drawCtx.beginPath();
        drawCtx.moveTo(e.offsetX, e.offsetY);
      });
      drawCanvas.addEventListener('mousemove', e => {
        if (!isDrawing) return;
        drawCtx.lineTo(e.offsetX, e.offsetY);
        drawCtx.strokeStyle = this._eraserActive ? 'rgba(0,0,0,1)' : currentColor;
        drawCtx.lineWidth = this._eraserActive ? currentSize * 3 : currentSize;
        drawCtx.lineCap = 'round';
        drawCtx.lineJoin = 'round';
        drawCtx.stroke();
      });
      drawCanvas.addEventListener('mouseup',    () => { isDrawing = false; drawCtx.beginPath(); });
      drawCanvas.addEventListener('mouseleave', () => { isDrawing = false; drawCtx.beginPath(); });

      const grid = document.querySelector('.grid');
      const gridRect = grid.getBoundingClientRect();
      const gridOffX = gridRect.left + window.scrollX;
      const gridOffY = gridRect.top  + window.scrollY;

      document.querySelectorAll('.item').forEach(item => {
        const img = item.querySelector('img');
        let x, y, w, h;

        if (item.style.position === 'absolute') {
          // Already positioned — use raw style values (unrotated) + grid offset
          x = parseFloat(item.style.left)  + gridOffX;
          y = parseFloat(item.style.top)   + gridOffY;
          w = parseFloat(item.style.width);
          h = parseFloat(item.style.height);
        } else {
          // Not yet positioned — use getBoundingClientRect
          const rect = img.getBoundingClientRect();
          x = rect.left + window.scrollX;
          y = rect.top  + window.scrollY;
          w = rect.width;
          h = rect.height || img.naturalHeight * (rect.width / img.naturalWidth);
        }

        const rotation = parseFloat(item.style.transform?.match(/rotate\((.+?)deg\)/)?.[1] || 0);
        const widget = this.addWidget(img.src, img.alt, x, y, w, h);
        if (rotation) { widget.style.transform = `rotate(${rotation}deg)`; widget.dataset.rotation = rotation; }
        this.widgets.push(widget);
      });

      // Recover existing drawing widgets from DOM so they survive re-edits
      document.querySelectorAll('.drawing-item').forEach(el => {
        const rect = el.getBoundingClientRect();
        const x = rect.left + window.scrollX;
        const y = rect.top  + window.scrollY;
        const w = parseFloat(el.style.width)  || rect.width;
        const h = parseFloat(el.style.height) || rect.height;
        const widget = this.addWidget(el.src, 'drawing', x, y, w, h);
        this.drawWidgets.push(widget);

        // Delete button
        const del = document.createElement('button');
        del.textContent = '✕';
        del.style.cssText = 'position:absolute;top:-26px;right:0;background:#ff3333;color:#fff;border:none;padding:3px 8px;font:bold 11px monospace;cursor:pointer;border-radius:2px;z-index:3;';
        del.addEventListener('mousedown', e => e.stopPropagation());
        del.addEventListener('click', () => {
          const idx = this.drawWidgets.indexOf(widget);
          if (idx > -1) this.drawWidgets.splice(idx, 1);
          widget.remove();
        });
        widget.appendChild(del);
      });

      document.addEventListener('keydown', this._keys = e => {
        if (e.key === 'Enter') this.apply();
        if (e.key === 'Escape') { this.close(); this.active = false; document.getElementById('editBtn').textContent = 'EDITAR'; }
      });
    },

    addWidget(src, alt, x, y, w, h) {
      const widget = document.createElement('div');
      Object.assign(widget.style, {
        position: 'absolute', left: x + 'px', top: y + 'px',
        width: w + 'px', height: h + 'px', cursor: 'move', userSelect: 'none', zIndex: '1',
      });
      const img = document.createElement('img');
      img.src = src; img.alt = alt;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;';
      widget.appendChild(img);
      const border = document.createElement('div');
      border.style.cssText = 'position:absolute;inset:0;border:2px solid #0066ff;pointer-events:none;box-sizing:border-box;';
      widget.appendChild(border);
      const label = document.createElement('div');
      label.style.cssText = 'position:absolute;bottom:-26px;left:0;background:#0066ff;color:#fff;font:bold 11px monospace;padding:3px 8px;white-space:nowrap;pointer-events:none;';
      widget.appendChild(label);
      const update = () => {
        label.textContent = Math.round(parseFloat(widget.style.width)) + ' × ' + Math.round(parseFloat(widget.style.height)) + 'px';
      };
      update();
      [
        ['nw','top:-6px;left:-6px;cursor:nw-resize'],
        ['n', 'top:-6px;left:calc(50% - 5px);cursor:n-resize'],
        ['ne','top:-6px;right:-6px;cursor:ne-resize'],
        ['e', 'top:calc(50% - 5px);right:-6px;cursor:e-resize'],
        ['se','bottom:-6px;right:-6px;cursor:se-resize'],
        ['s', 'bottom:-6px;left:calc(50% - 5px);cursor:s-resize'],
        ['sw','bottom:-6px;left:-6px;cursor:sw-resize'],
        ['w', 'top:calc(50% - 5px);left:-6px;cursor:w-resize'],
      ].forEach(([pos, style]) => {
        const h = document.createElement('div');
        h.dataset.h = pos;
        h.style.cssText = 'position:absolute;width:12px;height:12px;background:#fff;border:2px solid #0066ff;box-sizing:border-box;z-index:2;' + style;
        widget.appendChild(h);
      });
      // Rotation handle
      const rotHandle = document.createElement('div');
      rotHandle.style.cssText = 'position:absolute;top:-38px;left:calc(50% - 11px);width:22px;height:22px;background:#fff;border:2px solid #0066ff;border-radius:50%;cursor:grab;z-index:3;font-size:14px;line-height:18px;text-align:center;user-select:none;';
      rotHandle.textContent = '↻';
      widget.appendChild(rotHandle);

      rotHandle.addEventListener('mousedown', e => {
        e.preventDefault(); e.stopPropagation();
        const getCenter = () => {
          const r = widget.getBoundingClientRect();
          return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };
        };
        const { cx, cy } = getCenter();
        const onMove = e => {
          const angle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI + 90;
          widget.style.transform = `rotate(${angle}deg)`;
          widget.dataset.rotation = angle;
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      this.canvas.appendChild(widget);
      this.setupInteraction(widget, update);
      return widget;
    },

    setupInteraction(widget, update) {
      let mode = null, dir = null;
      let mx0, my0, x0, y0, w0, h0, ratio;

      widget.addEventListener('mousedown', e => {
        dir = e.target.dataset.h || null;
        mode = dir ? 'resize' : 'move';
        mx0 = e.clientX; my0 = e.clientY;
        x0 = parseFloat(widget.style.left);
        y0 = parseFloat(widget.style.top);
        w0 = parseFloat(widget.style.width);
        h0 = parseFloat(widget.style.height);
        ratio = w0 / h0;
        widget.style.zIndex = 10;
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!mode) return;
        const dx = e.clientX - mx0;
        const dy = e.clientY - my0;
        const MIN = 40;

        if (mode === 'move') {
          widget.style.left = (x0 + dx) + 'px';
          widget.style.top  = (y0 + dy) + 'px';
        } else {
          // Proportional resize: determine primary delta from handle direction
          let dw = 0, dh = 0;
          if (dir.includes('e')) dw =  dx;
          if (dir.includes('w')) dw = -dx;
          if (dir.includes('s')) dh =  dy;
          if (dir.includes('n')) dh = -dy;

          let newW, newH;
          if (dw !== 0 && dh !== 0) {
            // Corner: use the larger relative change to drive both axes
            if (Math.abs(dw) / w0 >= Math.abs(dh) / h0) {
              newW = Math.max(MIN, w0 + dw);
              newH = newW / ratio;
            } else {
              newH = Math.max(MIN, h0 + dh);
              newW = newH * ratio;
            }
          } else if (dw !== 0) {
            newW = Math.max(MIN, w0 + dw);
            newH = newW / ratio;
          } else {
            newH = Math.max(MIN, h0 + dh);
            newW = newH * ratio;
          }

          // Anchor opposite edge/corner
          let newX = x0, newY = y0;
          if (dir.includes('w')) newX = x0 + w0 - newW;
          if (dir.includes('n')) newY = y0 + h0 - newH;

          widget.style.width  = newW + 'px';
          widget.style.height = newH + 'px';
          widget.style.left   = newX + 'px';
          widget.style.top    = newY + 'px';
        }
        update();
      });

      document.addEventListener('mouseup', () => {
        if (!mode) return;
        mode = null; dir = null;
        widget.style.zIndex = 1;
      });
    },

    apply() {
      const items = document.querySelectorAll('.item');
      const grid  = document.querySelector('.grid');

      // Get grid's document-absolute offset BEFORE touching the DOM
      const gridRect = grid.getBoundingClientRect();
      const gridOffX = gridRect.left + window.scrollX;
      const gridOffY = gridRect.top  + window.scrollY;

      let maxBottom = 0;

      this.widgets.forEach((widget, i) => {
        const item = items[i];
        if (!item) return;

        // Widget positions are document-absolute; make them relative to grid
        const x = parseFloat(widget.style.left) - gridOffX;
        const y = parseFloat(widget.style.top)  - gridOffY;
        const w = parseFloat(widget.style.width);
        const h = parseFloat(widget.style.height);

        const rotation = parseFloat(widget.dataset.rotation || 0);

        Object.assign(item.style, {
          position: 'absolute',
          left: x + 'px', top: y + 'px',
          width: w + 'px', height: h + 'px',
          overflow: 'visible',
          transform: `rotate(${rotation}deg)`,
          transformOrigin: 'center center',
        });

        const img = item.querySelector('img');
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'cover';

        maxBottom = Math.max(maxBottom, y + h);
      });

      // Switch grid from CSS grid to free-form canvas
      grid.style.display  = 'block';
      grid.style.position = 'relative';
      grid.style.height   = (maxBottom + 60) + 'px';

      // Persist layout
      const layout = this.widgets.map(widget => ({
        x: parseFloat(widget.style.left) - gridOffX,
        y: parseFloat(widget.style.top)  - gridOffY,
        w: parseFloat(widget.style.width),
        h: parseFloat(widget.style.height),
        rotation: parseFloat(widget.dataset.rotation || 0),
      }));
      const drawings = this.drawWidgets.map(widget => ({
        x: parseFloat(widget.style.left) - gridOffX,
        y: parseFloat(widget.style.top)  - gridOffY,
        w: parseFloat(widget.style.width),
        h: parseFloat(widget.style.height),
        src: widget.querySelector('img').src,
      }));
      localStorage.setItem('mediaLayout', JSON.stringify({ viewportWidth: window.innerWidth, images: layout, drawings }));

      // Apply movable drawing widgets
      document.querySelectorAll('.drawing-item').forEach(el => el.remove());
      this.drawWidgets.forEach(widget => {
        const x = parseFloat(widget.style.left) - gridOffX;
        const y = parseFloat(widget.style.top)  - gridOffY;
        const w = parseFloat(widget.style.width);
        const h = parseFloat(widget.style.height);
        const el = document.createElement('img');
        el.className = 'drawing-item';
        el.src = widget.querySelector('img').src;
        Object.assign(el.style, {
          position: 'absolute', left: x + 'px', top: y + 'px',
          width: w + 'px', height: h + 'px',
          pointerEvents: 'none', zIndex: '150',
        });
        grid.appendChild(el);
        maxBottom = Math.max(maxBottom, y + h);
      });

      // Persist drawing
      if (this._drawCanvas) {
        localStorage.setItem('mediaDrawing', this._drawCanvas.toDataURL());
        const overlay = document.createElement('img');
        Object.assign(overlay.style, {
          position: 'absolute', top: '0', left: '0',
          width: '100%', pointerEvents: 'none', zIndex: '200',
        });
        overlay.src = this._drawCanvas.toDataURL();
        overlay.id = 'drawing-overlay';
        const old = document.getElementById('drawing-overlay');
        if (old) old.remove();
        grid.appendChild(overlay);
      }

      this.close();
      this.active = false;
      document.getElementById('editBtn').textContent = 'EDITAR';
    },

    close() {
      this.canvas?.remove();
      this.canvas = null;
      this.widgets = [];
      this.drawWidgets = [];
      document.removeEventListener('keydown', this._keys);
    },
  };
  </script>

</body>
</html>
