<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mediamplifier</title>
  <link rel="icon" type="image/png" href="images/favicon.png?v=9">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <span class="header-name">Martín Abelli</span>
    <a href="/"><img src="images/medialogo_crop.png" class="logo" alt="mediamplifier"></a>
    <a class="header-ig" href="https://instagram.com/mediamplifier" target="_blank">instagram</a>
  </header>

  <main class="gallery">

    <!-- Row 1: large portrait + small portrait (4+2) -->
    <div class="gallery-item col-4">
      <img src="images/courtjester.png" alt="The Jester">
    </div>
    <div class="gallery-item col-2">
      <img src="images/flowfinal.png" alt="Flores">
    </div>

    <!-- Row 2: full width landscape — visual break (6) -->
    <div class="gallery-item col-6">
      <img src="images/blaz.jpg" alt="Blaz Skateboarding">
    </div>

    <!-- Row 3: small + large (2+4) — inverted rhythm -->
    <div class="gallery-item col-2">
      <img src="images/damodel.png" alt="Da Model">
    </div>
    <div class="gallery-item col-4">
      <img src="images/miedonuevo.png" alt="Miedo Nuevo">
    </div>

    <!-- Row 4: equal halves (3+3) -->
    <div class="gallery-item col-3">
      <img src="images/oxomi1.png" alt="Oxomi">
    </div>
    <div class="gallery-item col-3">
      <img src="images/thecd.png" alt="The CD">
    </div>

    <!-- Row 5: large + small (4+2) -->
    <div class="gallery-item col-4">
      <img src="images/finals.png" alt="Finals">
    </div>
    <div class="gallery-item col-2">
      <img src="images/bygrace1.png" alt="By Grace">
    </div>

    <!-- Row 6: equal halves, square meets portrait (3+3) -->
    <div class="gallery-item col-3">
      <img src="images/horse.png" alt="Horse">
    </div>
    <div class="gallery-item col-3">
      <img src="images/lone.png" alt="Lone">
    </div>

    <!-- Row 7: small + large — closing rhythm (2+4) -->
    <div class="gallery-item col-2">
      <img src="images/lone3.png" alt="Lone 3">
    </div>
    <div class="gallery-item col-4">
      <img src="images/realmen.png" alt="Real Men">
    </div>

  </main>

</body>
</html>
